version: '3.4'

# Global LLM gateway stack:
#   - one-api          (port 3000)   main LLM relay, credits user quota
#   - payment-service  (port 3001)   Polar (MoR) gateway for global card payments
#   - mysql            (port 3306)   both services share this; payment uses
#                                    a separate schema oneapi_payment
#   - redis            (internal)    one-api cache; optional
#
# Environment overrides live in .env (sibling of this file).
# Sample at .env.example.

services:
  one-api:
    image: "${REGISTRY:-docker.io}/justsong/one-api:latest"
    container_name: one-api
    restart: always
    command: --log-dir /app/logs
    ports:
      - "3000:3000"
    volumes:
      - ./data/oneapi:/data
      - ./logs:/app/logs
    environment:
      - SQL_DSN=oneapi:123456@tcp(db:3306)/one-api
      - REDIS_CONN_STRING=redis://redis
      - SESSION_SECRET=${SESSION_SECRET:-please_set_in_env_file}
      - TZ=UTC
      # PR #1: shared with payment-service. Both sides MUST use the same value.
      - INTERNAL_API_SECRET=${INTERNAL_API_SECRET}
    depends_on:
      - redis
      - db
    networks:
      - internal_net
    healthcheck:
      test: [ "CMD-SHELL", "wget -q -O - http://localhost:3000/api/status | grep -o '\"success\":\\s*true' | awk -F: '{print $2}'" ]
      interval: 30s
      timeout: 10s
      retries: 3

  payment-service:
    build:
      context: ./payment
      dockerfile: Dockerfile
    container_name: payment-service
    restart: always
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_FORMAT=${LOG_FORMAT:-json}
      - DATABASE_URL=oneapi:123456@tcp(db:3306)/oneapi_payment?charset=utf8mb4&parseTime=True&loc=UTC
      # one-api integration (PR #1).
      - ONE_API_INTERNAL_URL=http://one-api:3000
      - INTERNAL_API_SECRET=${INTERNAL_API_SECRET}
      # Polar provider. Webhook secret + org id + product id live in
      # payment_config (admin-editable); only the access token is here.
      - POLAR_ACCESS_TOKEN=${POLAR_ACCESS_TOKEN}
      - POLAR_SANDBOX=${POLAR_SANDBOX:-true}
      # Public URL the payment-service is reachable at (for webhook docs).
      - PAYMENT_BASE_URL=${PAYMENT_BASE_URL:-http://localhost:3001}
      - TZ=UTC
    depends_on:
      - db
      - one-api
    networks:
      - internal_net
    healthcheck:
      test: [ "CMD", "curl", "-fsS", "http://localhost:3001/healthz" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  redis:
    image: "${REGISTRY:-docker.io}/redis:latest"
    container_name: redis
    restart: always
    networks:
      - internal_net

  db:
    image: "${REGISTRY:-docker.io}/mysql:8.2.0"
    restart: always
    container_name: mysql
    volumes:
      - ./data/mysql:/var/lib/mysql
      # Auto-creates the payment-service schema on first boot.
      - ./payment/migrations/00_create_schema.sql:/docker-entrypoint-initdb.d/00_create_schema.sql:ro
    ports:
      - '3306:3306'
    environment:
      TZ: UTC
      MYSQL_ROOT_PASSWORD: 'OneAPI@justsong'
      MYSQL_USER: oneapi
      MYSQL_PASSWORD: '123456'
      MYSQL_DATABASE: one-api
    networks:
      - internal_net

networks:
  internal_net:
    driver: bridge
